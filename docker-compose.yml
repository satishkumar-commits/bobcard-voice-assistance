services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bobcards-voice-assistant
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    env_file:
      - .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
